services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drogamais_backend
    restart: on-failure
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
      DB_SYNC_HOST: ${DB_SYNC_HOST}
      DB_SYNC_PORT: ${DB_SYNC_PORT}
      DB_SYNC_USER: ${DB_SYNC_USER}
      DB_SYNC_PASS: ${DB_SYNC_PASS}
    env_file:
      - .env
    volumes:
      - ./imgs:/app/imgs
    command: >
      sh -c "npx prisma generate &&
             npx prisma db push --accept-data-loss &&
             node prisma/seed.js &&
             node scripts/sync-lojas.js || true &&
             node src/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: drogamais_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
