services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drogamais_backend
    restart: on-failure
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
    env_file:
      - .env
    command: >
      sh -c "npx prisma generate && 
             npx prisma db push --accept-data-loss && 
             node prisma/seed.js && 
             node src/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: drogamais_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
